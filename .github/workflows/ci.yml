name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build, Test & Package
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          make -C packaging

      - name: Run automated compliance tests
        run: |
          swift tests/check-project-structure.swift
          swift tests/check-daemon-release-flow.swift

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package distribution archive
        run: |
          mkdir -p dist
          # Package required installer scripts (daemon & GUI), universal binary assets, and docs
          zip -r dist/PushToTalk.zip \
            scripts \
            dist/pushtotalk \
            dist/PushToTalk.app \
            docs \
            README.md
          chmod +x packaging/package-dmg.sh
          ./packaging/package-dmg.sh

      - name: Run Semantic Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
